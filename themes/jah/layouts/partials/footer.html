<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <span class="footer-logo">Jose Hernandez</span>
      <p class="footer-tagline">{{ .Site.Params.tagline }}</p>
    </div>
    <div class="footer-meta">
      <p class="footer-copy">
        &copy; {{ now.Format "2006" }} {{ .Site.Params.author }}.
        Built with <a href="https://gohugo.io" class="footer-link" target="_blank" rel="noopener">Hugo</a>.
      </p>
      {{ with .Site.Params.githubHandle }}
        <a href="https://github.com/{{ . }}" class="footer-link" target="_blank" rel="noopener">GitHub</a>
      {{ end }}
      {{ with .Site.Params.linkeInHandle }}
        <a href="https://linkedin.com/in/{{ . }}" class="footer-link" target="_blank" rel="noopener">LinkedIn</a>
      {{ end }}
    </div>
  </div>
</footer>
