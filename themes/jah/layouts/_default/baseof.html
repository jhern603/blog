<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
<head>
  {{ partial "head.html" . }}
</head>
<body class="site-body">

  {{ partial "nav.html" . }}

  <main class="site-main" id="main-content">
    {{- block "main" . }}{{- end }}
  </main>

  {{ partial "footer.html" . }}

  {{- if .Store.Get "hasMermaid" }}
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    // Hugo HTML-encodes content inside pre elements (e.g. --> becomes --&gt;).
    // Mermaid reads innerHTML, so we normalize to plain text first.
    document.querySelectorAll('pre.mermaid').forEach(el => {
      el.textContent = el.textContent;
    });
    mermaid.initialize({
      startOnLoad: true,
      theme: 'base',
      themeVariables: {
        background:          '#1C2D3E',
        primaryColor:        '#243448',
        primaryTextColor:    '#E8EDF2',
        primaryBorderColor:  '#3A5170',
        lineColor:           '#7A95AB',
        secondaryColor:      '#1C2D3E',
        tertiaryColor:       '#243448',
        edgeLabelBackground: '#243448',
        clusterBkg:          '#243448',
        titleColor:          '#E8EDF2',
        nodeBorder:          '#3A5170',
        fontFamily:          'Inter, system-ui, sans-serif',
        fontSize:            '14px',
        activeTaskBorderColor: '#5BB8D4',
        activeTaskBkgColor:    '#2A7BA0',
      }
    });
  </script>
  {{- end }}

</body>
</html>
